version: '3'

dotenv: [ '.env' ]

tasks:
  # Replay download
  download:
    desc: Download replays from spawningtool.com (default 5 pages)
    cmds:
      - uv run python scripts/download_replays.py --pages={{.PAGES | default "5"}} --delay={{.DELAY | default "0.5"}}

  # Database generation
  generate:
    desc: Generate snapshot database from all replays
    cmds:
      - uv run python -m src.generate

  validate:
    desc: Validate generated snapshot database
    cmds:
      - uv run python -m src.validate
    deps:
      - generate

  # Development servers
  backend:
    desc: Run FastAPI backend server
    dir: .
    cmds:
      - uv run uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    desc: Run React frontend dev server
    dir: frontend
    cmds:
      - npm run dev -- --host

  # Testing
  test:
    desc: Run tests with pytest
    cmds:
      - uv run pytest tests/ -v

  # Database management
  init-db:
    desc: Initialize database (creates tables)
    cmds:
      - uv run python -c "from src.database import init_database; from pathlib import Path; init_database(Path('data/replays.db'))"

  clean:
    desc: Remove generated databases
    cmds:
      - rm -f data/snapshots.db
      - rm -f data/replays.db

  # Setup
  install:
    desc: Install all dependencies (Python + Node)
    cmds:
      - uv pip install -r requirements.txt
      - cd frontend && npm install

  # Build for production
  build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - npm run build